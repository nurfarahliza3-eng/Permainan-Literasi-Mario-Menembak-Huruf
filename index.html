<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permainan Mario Menembak Huruf</title>
    <style>
        body { text-align: center; }
        canvas { border: 1px solid #000; }
    </style>
</head>
<body>
    <h1>Permainan Mario Menembak Huruf</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let mario = { x: 50, y: canvas.height / 2, width: 50, height: 50 };
        let bullets = [];
        let enemies = [];

        function drawMario() {
            ctx.fillStyle = 'red';
            ctx.fillRect(mario.x, mario.y, mario.width, mario.height);
        }

        function shootBullet() {
            bullets.push({ x: mario.x + mario.width, y: mario.y + mario.height / 2, width: 10 });
        }

        function updateBullets() {
            bullets.forEach((bullet, index) => {
                bullet.x += 5;
                if (bullet.x > canvas.width) {
                    bullets.splice(index, 1);
                }
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                shootBullet();
            }
            if (e.code === 'ArrowUp' && mario.y > 0) {
                mario.y -= 10;
            }
            if (e.code === 'ArrowDown' && mario.y < canvas.height - mario.height) {
                mario.y += 10;
            }
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMario();
            updateBullets();
            bullets.forEach(bullet => {
                ctx.fillStyle = 'blue';
                ctx.fillRect(bullet.x, bullet.y, bullet.width, 5);
            });
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
